[phases.setup]
nixPkgs = ["python313"]

[phases.install]
cmds = [
    "echo 'Files in /app:' && ls -la /app",
    "echo 'Installing dependencies...'",
    "pip install --upgrade pip setuptools wheel",
    "pip install pdfplumber>=0.10 flask>=3.0 gunicorn>=21.0",
    "echo 'Checking if src exists:' && ls -la /app/src || echo 'src directory not found!'"
]

[start]
cmd = "PYTHONPATH=/app/src:$PYTHONPATH gunicorn archery_parser.web:app --bind 0.0.0.0:${PORT:-8080} --chdir /app"
